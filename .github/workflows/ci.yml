name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
          - os: macos-15
            name: macOS-x64
          - os: ubuntu-24.04
            name: Linux-x64
          - os: ubuntu-24.04-arm
            name: Linux-arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # SDL3 — Homebrew on macOS, build from source on Linux
      - name: Install SDL3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl3

      - name: Install SDL3 build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev libwayland-dev libxkbcommon-dev libegl-dev libgles-dev

      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch release-3.2.14 https://github.com/libsdl-org/SDL.git /tmp/SDL3-src
          cmake -S /tmp/SDL3-src -B /tmp/SDL3-build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/SDL3-build -j$(nproc)
          sudo cmake --install /tmp/SDL3-build
          sudo ldconfig

      # Other dependencies
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install luajit shaderc spirv-cross

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libluajit-5.1-dev glslc spirv-cross

      - name: Test
        run: zig build test
        env:
          SDL_VIDEODRIVER: dummy

      - name: Build
        run: zig build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunatic-${{ matrix.name }}
          path: zig-out/bin/lunatic*
